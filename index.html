<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Dynamic Favicon for Anime Discovery -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌌</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Discover, track, and legally stream your favorite anime." />
    
    <title>Anime Discovery | Safe Harbor</title>

    <!-- Pre-load essential fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Pre-mount Aesthetic Styling -->
    <style>
      body {
        margin: 0;
        background-color: #0a0a0f; /* Deep space dark */
        background-image: 
          radial-gradient(circle at 15% 50%, rgba(138, 43, 226, 0.08), transparent 25%),
          radial-gradient(circle at 85% 30%, rgba(255, 0, 127, 0.08), transparent 25%);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Outfit', sans-serif;
      }
      
      /* Glowing Pulse Loader before React Mounts */
      #initial-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
      }

      .pulse-ring {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, #8a2be2, #ff007f);
        animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        box-shadow: 0 0 30px rgba(255, 0, 127, 0.5);
      }

      .loader-text {
        color: #f0f0f5;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        background: linear-gradient(135deg, #8a2be2, #ff007f);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: fade 1.5s ease-in-out infinite alternate;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.2); opacity: 0.7; }
      }

      @keyframes fade {
        from { opacity: 0.6; }
        to { opacity: 1; }
      }
    </style>
    <script type="module" crossorigin src="/Anime-Discovery-MyAnimelist/assets/index-CuL-mhUJ.js"></script>
    <link rel="stylesheet" crossorigin href="/Anime-Discovery-MyAnimelist/assets/index-CEr3JXK9.css">
  </head>
  <body>
    <div id="root">
      <!-- This loader will instantly disappear the millisecond React renders -->
      <div id="initial-loader">
        <div class="pulse-ring"></div>
        <div class="loader-text">Initializing Gateway</div>
      </div>
    </div>
  </body>
</html>
